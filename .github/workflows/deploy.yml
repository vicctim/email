name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy para VPS
    runs-on: ubuntu-latest
    steps:
      - name: Executar redeploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: bash /srv/clientes/victor/email/scripts/redeploy.sh
          script_stop: true
          command_timeout: 10m
