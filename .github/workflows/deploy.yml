name: Deploy

on:
  push:
    branches: [main]

# Deploy acontece via GitHub Webhook direto para hooks.victorsamuel.com.br
# Este workflow existe apenas para mostrar o status do push no GitHub UI.
# O redeploy real é disparado pelo webhook registrado no repositório.
jobs:
  status:
    name: Push registrado
    runs-on: ubuntu-latest
    steps:
      - run: echo "Push recebido. Redeploy disparado via webhook para o servidor."
